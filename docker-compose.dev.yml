# DeepSearch 开发环境基础设施
# 只包含 PostgreSQL / Redis / Meilisearch

services:
  postgres:
    image: postgres:15-alpine
    container_name: deepsearch-dev-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=deepsearch
      - POSTGRES_USER=deepsearch
      - POSTGRES_PASSWORD=deepsearch123
    volumes:
      - dev-postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U deepsearch -d deepsearch" ]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: deepsearch-dev-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - dev-redis-data:/data
    ports:
      - "6381:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: deepsearch-dev-meilisearch
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=deepsearch_meili_key
      - MEILI_ENV=development
      - MEILI_NO_ANALYTICS=true
    volumes:
      - dev-meili-data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7700/health" ]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  dev-postgres-data:
  dev-redis-data:
  dev-meili-data:
