# Alembic 配置文件

[alembic]
# Alembic 脚本位置
script_location = migrations

# 模板文件路径
# file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# SQLAlchemy URL (会被 env.py 覆盖)
# sqlalchemy.url = 

# 版本表名称
version_table = alembic_version

# 是否开启输出
prepend_sys_path = .

[post_write_hooks]
# 格式化迁移脚本
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
